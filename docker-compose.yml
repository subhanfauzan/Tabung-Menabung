services:
  mysql:
    image: mysql:8.0
    container_name: finance_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    env_file:
      - .env
    command: tunnel run --protocol http2
    depends_on:
      - frontend

  backend:
    build: ./backend
    container_name: finance_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/finance_app
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      REFRESH_TOKEN_SECRET: your-super-secret-refresh-key-change-this-in-production
      PORT: 3003
      NODE_ENV: production
      FRONTEND_URL: https://tabung-menabung.cldhns.my.id
      ALLOWED_ORIGINS: https://tabung-menabung.cldhns.my.id,http://localhost:5173,http://localhost
    command: sh -c "npx prisma db push && npm start"
    ports:
      - "3003:3003"

  frontend:
    build: ./frontend
    container_name: finance_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
