version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: finance_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: finance_backend
    restart: always
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/finance_app
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      REFRESH_TOKEN_SECRET: your-super-secret-refresh-key-change-this-in-production
      PORT: 3003
      NODE_ENV: development
    ports:
      - "3003:3003"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: finance_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  mysql_data: